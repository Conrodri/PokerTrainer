services:
  - type: web
    name: pokertrainer-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd backend && npm install --include=dev && npm run build && npx prisma db push
    startCommand: cd backend && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard (Neon URL)
      - key: JWT_SECRET
        sync: false          # set manually in Render dashboard
      - key: CORS_ORIGIN
        sync: false          # set to your Vercel URL once deployed
      - key: PORT
        value: 10000
      - key: GOOGLE_CLIENT_ID
        sync: false          # set manually in Render dashboard (Google Cloud Console)
      - key: GOOGLE_CLIENT_SECRET
        sync: false          # set manually in Render dashboard
      - key: GOOGLE_REDIRECT_URI
        value: https://pokertrainer.onrender.com/api/auth/google/callback
      - key: FRONTEND_URL
        sync: false          # set manually: your Vercel frontend URL
